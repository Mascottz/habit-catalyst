<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanctuary</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-60 bg-white p-4 space-y-2 shadow">
<h1 class="text-xl font-bold mb-4">Sanctuary</h1>

<button class="nav-item w-full text-left p-2 rounded" data-page="dashboard" onclick="switchPage('dashboard')">Dashboard</button>
<button class="nav-item w-full text-left p-2 rounded" data-page="bible" onclick="switchPage('bible')">Bible</button>
<button class="nav-item w-full text-left p-2 rounded" data-page="habits" onclick="switchPage('habits')">Habits</button>
<button class="nav-item w-full text-left p-2 rounded" data-page="prayers" onclick="switchPage('prayers')">Prayers</button>
</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-y-auto">

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<h1 id="dynamic-greeting" class="text-2xl font-bold"></h1>
<p id="current-date" class="text-gray-500 mb-4"></p>

<!-- PLAN SELECT -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h2 class="font-bold mb-2">📚 Reading Plan</h2>
<select id="plan-select" onchange="changePlan()" class="border p-1">
<option value="beginner">Beginner</option>
<option value="standard">Standard</option>
<option value="deep">Deep</option>
</select>
</div>

<!-- PROGRESS -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h2 class="font-bold">📊 Progress</h2>
<p id="progress-text"></p>
<div class="w-full bg-gray-200 h-3 rounded mt-2">
<div id="progress-bar" class="bg-black h-3 rounded"></div>
</div>
</div>

<!-- STREAK -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
🔥 Streak: <span id="streak-count">0</span> days
</div>

<!-- DEVOTION -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h2 class="font-bold">📖 Devotion</h2>
<div id="daily-devotion"></div>
</div>

<!-- CHAPTER -->
<div class="bg-white p-4 rounded-xl shadow mb-4">
<h2 class="font-bold">📘 Today's Reading</h2>
<div id="todays-chapter"></div>
</div>

<!-- COMPLETE BUTTON -->
<button onclick="completeToday()" class="bg-black text-white px-4 py-2 rounded mb-4">
Mark Today Complete
</button>

<!-- UNLOCK -->
<div id="unlock-box" class="bg-green-100 p-3 rounded hidden"></div>

<!-- HEATMAP -->
<div class="bg-white p-4 rounded-xl shadow">
<h2 class="font-bold mb-2">🔥 Consistency</h2>
<div id="yearly-heatmap" class="grid grid-cols-7 gap-1"></div>
</div>

</div>

<!-- BIBLE -->
<div id="bible" class="page hidden">
<div class="bg-white p-4 rounded-xl shadow">
<h2 class="font-bold">Bible</h2>
<select id="bible-book-select" onchange="populateChapters()"></select>
<select id="bible-chapter-select"></select>
<button onclick="fetchBible()">Load</button>
<div id="bible-view-body"></div>
</div>
</div>

<!-- HABITS -->
<div id="habits" class="page hidden">
<div class="bg-white p-4 rounded-xl shadow">
<input id="habit-input" placeholder="Habit">
<button onclick="addHabit()">Add</button>
<div id="habit-list"></div>
</div>
</div>

<!-- PRAYERS -->
<div id="prayers" class="page hidden">
<div class="bg-white p-4 rounded-xl shadow">
<input id="prayer-input">
<button onclick="addPrayer()">Add</button>
<div id="prayer-list"></div>
</div>
</div>

</div>
</div>

<script>

/* STORAGE */
const KEY="sanctuary_v2";

let data=JSON.parse(localStorage.getItem(KEY))||{
habits:[],
prayers:[],
heatmap:{},
readingLog:{},
currentDay:1,
plan:"beginner",
lastCompleted:null
};

function save(){localStorage.setItem(KEY,JSON.stringify(data));}

/* PLANS */
const plans={
beginner:30,
standard:90,
deep:365
};

/* DEVOTION */
const devotions=[
"God is with you today.",
"You are being guided.",
"Stay rooted in truth.",
"Walk in faith today."
];

/* NAV */
function switchPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.add("hidden"));
document.getElementById(p).classList.remove("hidden");

document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("bg-black","text-white"));
document.querySelector(`[data-page="${p}"]`).classList.add("bg-black","text-white");
}

/* GREETING */
(function(){
const h=new Date().getHours();
dynamic-greeting.textContent=h<12?"Good Morning":h<18?"Good Afternoon":"Good Evening";
current-date.textContent=new Date().toDateString();
})();

/* PLAN */
function changePlan(){
data.plan=document.getElementById("plan-select").value;
data.currentDay=1;
save();
updateUI();
}

/* PROGRESS */
function renderProgress(){
const total=plans[data.plan];
const percent=(data.currentDay/total)*100;

progress-text.textContent=`Day ${data.currentDay} / ${total}`;
progress-bar.style.width=percent+"%";
}

/* STREAK */
function calculateStreak(){
let streak=0;
let d=new Date();

while(true){
const key=d.toISOString().split("T")[0];
if(data.readingLog[key]){
streak++;
d.setDate(d.getDate()-1);
}else break;
}
streak-count.textContent=streak;
}

/* DEVOTION */
function loadDevotion(){
const d=devotions[(data.currentDay-1)%devotions.length];
daily-devotion.textContent=d;
}

/* CHAPTER */
function loadChapter(){
const chapter=data.currentDay;
fetch(`https://bible-api.com/john+${chapter}`)
.then(r=>r.json())
.then(d=>{
todays-chapter.innerHTML=d.verses.slice(0,8).map(v=>`<p>${v.text}</p>`).join("");
});
}

/* COMPLETE */
function completeToday(){
const today=new Date().toISOString().split("T")[0];

if(data.lastCompleted===today)return alert("Already done today");

data.readingLog[today]=true;
data.lastCompleted=today;
data.currentDay++;

data.heatmap[today]=(data.heatmap[today]||0)+1;

checkUnlock();

save();
updateUI();
}

/* UNLOCK */
function checkUnlock(){
const box=document.getElementById("unlock-box");

if(data.currentDay===7){
box.textContent="🔥 7 Day Streak Unlocked!";
box.classList.remove("hidden");
}
if(data.currentDay===30){
box.textContent="🏆 30 Days Completed!";
box.classList.remove("hidden");
}
}

/* HEATMAP */
function renderHeatmap(){
yearly-heatmap.innerHTML="";
const start=new Date(new Date().getFullYear(),0,1);

for(let i=0;i<365;i++){
let d=new Date(start);
d.setDate(start.getDate()+i);

let key=d.toISOString().split("T")[0];
let v=data.heatmap[key]||0;

let c="bg-gray-200";
if(v>0)c="bg-green-400";
if(v>3)c="bg-green-700";

yearly-heatmap.innerHTML+=`<div class="w-3 h-3 ${c}"></div>`;
}
}

/* HABITS */
function addHabit(){
let val=habit-input.value;
if(!val)return;
data.habits.push(val);
save();
renderHabits();
}
function renderHabits(){
habit-list.innerHTML="";
data.habits.forEach(h=>{
habit-list.innerHTML+=`<div>${h}</div>`;
});
}

/* PRAYERS */
function addPrayer(){
let val=prayer-input.value;
if(!val)return;
data.prayers.push(val);
save();
renderPrayers();
}
function renderPrayers(){
prayer-list.innerHTML="";
data.prayers.forEach(p=>{
prayer-list.innerHTML+=`<div>${p}</div>`;
});
}

/* BIBLE */
const books={john:21,psalms:150};
function populateBooks(){
for(let b in books){
bible-book-select.innerHTML+=`<option>${b}</option>`;
}
populateChapters();
}
function populateChapters(){
let b=bible-book-select.value;
bible-chapter-select.innerHTML="";
for(let i=1;i<=books[b];i++){
bible-chapter-select.innerHTML+=`<option>${i}</option>`;
}
}
function fetchBible(){
let b=bible-book-select.value;
let c=bible-chapter-select.value;

fetch(`https://bible-api.com/${b}+${c}`)
.then(r=>r.json())
.then(d=>{
bible-view-body.innerHTML=d.verses.map(v=>`<p>${v.text}</p>`).join("");
});
}

/* UI */
function updateUI(){
renderProgress();
calculateStreak();
loadDevotion();
loadChapter();
renderHeatmap();
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
populateBooks();
updateUI();
renderHabits();
renderPrayers();
switchPage("dashboard");
});

</script>

</body>
</html>
